<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>QuickCuts - Export Multiple Video Segments Online</title>

    <meta
      name="description"
      content="QuickCuts is a browser-based video editor that lets you select multiple segments from a video and export them as separate files instantly. Works offline after loading."
    />

    <meta
      name="keywords"
      content="video cutter, split video online, export video segments, browser video editor, free video editing tool"
    />

    <meta name="author" content="QuickCuts" />

    <link rel="canonical" href="https://quickcuts-msameer0.vercel.app/" />

    <meta
      property="og:title"
      content="QuickCuts - Export Video Segments Online"
    />
    <meta
      property="og:description"
      content="Select multiple video segments and export them instantly in your browser. No installation needed."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quickcuts-msameer0.vercel.app/" />
    <meta
      property="og:image"
      content="https://quickcuts-msameer0.vercel.app/preview.png"
    />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="theme-color" content="#000000" />

    <!-- Vercel Web Analytics -->
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="ffmpeg/ffmpeg.js"></script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "QuickCuts",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web Browser",
        "description": "Browser-based tool to select and export multiple video segments instantly."
      }
    </script>

    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="loader" class="loader-overlay" style="display: none">
      <div class="loader-content">
        <div class="spinner"></div>
        <h2 id="loaderTitle">INITIALIZING_ENGINE</h2>
        <p
          id="loaderText"
          style="color: var(--text-dim); margin-top: 0.5rem; font-size: 0.9rem"
        >
          Loading FFmpeg WebAssembly. This depends on your internet connection.
        </p>
        <div
          class="progress-container"
          id="progressContainer"
          style="display: none"
        >
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p
          id="progressText"
          style="
            display: none;
            font-variant-numeric: tabular-nums;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--accent);
          "
        ></p>
      </div>
    </div>

    <div class="editor-root">
      <header>
        <div class="brand"><span class="accent">QUICK</span>CUTS</div>
        <div class="header-actions">
          <div id="fileName" class="file-info">No file selected</div>
          <button id="themeToggle" class="icon-btn-circle" title="Toggle Theme">
            <svg
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="5" />
              <path
                d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
              />
            </svg>
          </button>
          <button id="exportBtn" class="primary-btn" disabled>EXPORT</button>
        </div>
      </header>

      <aside class="sidebar-left">
        <button class="tool-btn active" id="mediaTab">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
          Media
        </button>
        <button class="tool-btn" id="browseBtn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Upload
        </button>
        <input
          type="file"
          id="videoInput"
          accept="video/mp4,video/x-m4v,video/*"
          style="display: none"
        />
      </aside>

      <main class="main-content">
        <div class="preview-container">
          <video id="videoPlayer" playsinline>
            Your browser does not support the video tag.
          </video>
          <div class="preview-overlay" id="videoOverlay">
            <div class="play-pause-overlay">
              <svg
                id="playIconOverlay"
                viewBox="0 0 24 24"
                width="32"
                height="32"
                fill="currentColor"
              >
                <path d="M8 5v14l11-7z" />
              </svg>
            </div>
          </div>
        </div>
      </main>

      <aside class="inspector">
        <div class="inspector-header">
          SEGMENTS
          <span
            id="segmentCount"
            style="color: var(--accent); font-size: 0.8rem"
            >0</span
          >
        </div>
        <div class="inspector-content" id="segmentsList">
          <div class="empty-state">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <p>No segments yet</p>
            <p style="font-size: 0.75rem; margin-top: 0.5rem; opacity: 0.6">
              Use the timeline to mark segments
            </p>
          </div>
        </div>
      </aside>

      <section class="timeline-area">
        <div class="timeline-toolbar">
          <div class="time-display" id="currentTime">00:00:00.00</div>
          <div class="timeline-controls">
            <button
              id="addStartBtn"
              class="timeline-action-btn"
              title="Set Start Mark"
            >
              <svg
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M11 5L4 12L11 19" />
                <path d="M4 12H20" />
              </svg>
              START
            </button>
            <button
              id="playPauseBtn"
              class="icon-btn-circle"
              style="background: var(--accent); color: white"
            >
              <svg
                id="playIcon"
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="currentColor"
              >
                <path d="M8 5v14l11-7z" />
              </svg>
            </button>
            <button
              id="addEndBtn"
              class="timeline-action-btn"
              title="Set End Mark"
            >
              END
              <svg
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M13 19L20 12L13 5" />
                <path d="20 12H4" />
              </svg>
            </button>
          </div>
          <div
            class="time-display"
            id="duration"
            style="color: var(--text-dim)"
          >
            00:00:00.00
          </div>
        </div>

        <div class="timeline-view" id="timelineView">
          <div class="timeline-ruler" id="timelineRuler"></div>
          <div class="timeline-track">
            <div id="timelineSegments"></div>
            <div class="playhead" id="playhead"></div>
          </div>
          <input
            type="range"
            id="timeline"
            min="0"
            max="100"
            step="0.01"
            value="0"
            class="timeline-scrubber"
          />
        </div>
      </section>

      <nav class="mobile-toolbar">
        <button class="tool-btn active">
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
          Editor
        </button>
        <button class="tool-btn" id="mobileSegmentsBtn">
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
          </svg>
          Segments
        </button>
        <button class="tool-btn" id="mobileUploadBtn">
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Upload
        </button>
        <button class="tool-btn" id="mobileExportBtn">
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="4 7 4 4 20 4 20 7" />
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
            <path d="M12 11v4" />
            <path d="M9 13h6" />
          </svg>
          Export
        </button>
      </nav>
    </div>

    <div
      id="segmentsModal"
      class="loader-overlay"
      style="display: none; align-items: flex-end; padding: 0"
    >
      <div
        class="loader-content"
        style="
          width: 100%;
          max-width: none;
          background: var(--bg-panel);
          border-radius: 20px 20px 0 0;
          padding: 1.5rem;
          height: 80vh;
          display: flex;
          flex-direction: column;
          text-align: left;
        "
      >
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
          "
        >
          <h2 style="font-size: 1.2rem">Segments</h2>
          <button
            id="closeSegmentsBtn"
            style="padding: 0.5rem; color: var(--text-dim)"
          >
            CLOSE
          </button>
        </div>

        <div id="mobileSegmentsList" style="flex: 1; overflow-y: auto"></div>
      </div>
    </div>

    <div id="exportModal" class="loader-overlay" style="display: none">
      <div class="loader-content">
        <h2 style="margin-bottom: 0.5rem">Export Options</h2>
        <p
          style="
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 2rem;
          "
        >
          Select the export quality and method
        </p>

        <div style="display: grid; gap: 1rem; margin-bottom: 2rem">
          <button
            id="fastExportBtn"
            class="segment-card"
            style="text-align: left; width: 100%; cursor: pointer"
          >
            <div style="font-weight: 600; color: var(--accent)">
              Fast Export
            </div>
            <div
              style="
                font-size: 0.75rem;
                color: var(--text-dim);
                margin-top: 0.25rem;
              "
            >
              Instant cuts. May have minor glitches at the start of clips.
            </div>
          </button>
          <button
            id="balancedExportBtn"
            class="segment-card"
            style="text-align: left; width: 100%; cursor: pointer"
          >
            <div style="font-weight: 600; color: #ffca28">Balanced Export</div>
            <div
              style="
                font-size: 0.75rem;
                color: var(--text-dim);
                margin-top: 0.25rem;
              "
            >
              Frame accurate at 720p. 2-3x faster than Accurate mode.
            </div>
          </button>
          <button
            id="accurateExportBtn"
            class="segment-card"
            style="text-align: left; width: 100%; cursor: pointer"
          >
            <div style="font-weight: 600; color: #66bb6a">Accurate Export</div>
            <div
              style="
                font-size: 0.75rem;
                color: var(--text-dim);
                margin-top: 0.25rem;
              "
            >
              Full quality re-encode. Perfect frame accuracy but slow.
            </div>
          </button>
        </div>

        <button
          id="cancelExportBtn"
          style="
            color: var(--text-dim);
            font-size: 0.8rem;
            text-decoration: underline;
          "
        >
          Cancel
        </button>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
  </body>
</html>
